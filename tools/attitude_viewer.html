<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulador PID/Attitude</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #111; color: #eee; }
    .card { background: #1d1d1d; padding: 16px; border-radius: 10px; margin-bottom: 16px; }
    canvas { background: #000; border-radius: 8px; width: 100%; max-width: 900px; }
    input { width: 100%; margin-top: 6px; }
    button { padding: 8px 12px; margin-right: 8px; }
  </style>
</head>
<body>
  <h1>Simulador PID / Attitude</h1>
  <div class="card">
    <label>Roll RC <input id="rollRc" type="range" min="0" max="2000" value="992" /></label>
    <label>Pitch RC <input id="pitchRc" type="range" min="0" max="2000" value="992" /></label>
    <label>Throttle <input id="thrRc" type="range" min="0" max="2000" value="1000" /></label>
    <label>Yaw RC <input id="yawRc" type="range" min="0" max="2000" value="992" /></label>
    <br /><br />
    <label>Gyro Roll <input id="gyroRoll" type="range" min="-20" max="20" step="0.1" value="0" /></label>
    <label>Gyro Pitch <input id="gyroPitch" type="range" min="-20" max="20" step="0.1" value="0" /></label>
    <label>Gyro Yaw <input id="gyroYaw" type="range" min="-20" max="20" step="0.1" value="0" /></label>
    <br /><br />
    <button onclick="runStep()">Ejecutar paso</button>
    <button onclick="startAuto()">Auto</button>
    <button onclick="stopAuto()">Detener</button>
  </div>
  <div class="card">
    <div id="out"></div>
  </div>
  <canvas id="chart" width="900" height="300"></canvas>

  <script>
    class PID {
      constructor(kp, ki, kd, maxOutput, maxIntegral) {
        this.kp = kp; this.ki = ki; this.kd = kd; this.integral = 0; this.prevError = 0;
        this.maxOutput = maxOutput; this.maxIntegral = maxIntegral;
      }
      update(setpoint, measurement, dt) {
        const error = setpoint - measurement;
        this.integral += error * dt;
        this.integral = Math.max(-this.maxIntegral, Math.min(this.maxIntegral, this.integral));
        const derivative = (error - this.prevError) / (dt > 0 ? dt : 0.001);
        let output = this.kp*error + this.ki*this.integral + this.kd*derivative;
        output = Math.max(-this.maxOutput, Math.min(this.maxOutput, output));
        this.prevError = error;
        return output;
      }
    }

    const rollPid = new PID(0.25, 0.01, 0.002, 500, 2000);
    const pitchPid = new PID(0.25, 0.01, 0.002, 500, 2000);
    const yawPid = new PID(0.18, 0.005, 0.001, 300, 1500);
    const prevFiltered = [0, 0, 0];

    function rcToRate(channel) {
      let centered = channel - 992;
      if (centered > 250) centered = 250;
      else if (centered < -250) centered = -250;
      if (centered > -20 && centered < 20) centered = 0;
      return centered * 0.25;
    }

    function notch(raw) {
      const alpha = 0.18;
      const out = [];
      for (let i = 0; i < raw.length; i++) {
        prevFiltered[i] = prevFiltered[i] + alpha * (raw[i] - prevFiltered[i]);
        out.push(prevFiltered[i]);
      }
      return out;
    }

    function step() {
      const rc = [
        Number(document.getElementById('rollRc').value),
        Number(document.getElementById('pitchRc').value),
        Number(document.getElementById('thrRc').value),
        Number(document.getElementById('yawRc').value),
      ];
      const gyro = [
        Number(document.getElementById('gyroRoll').value),
        Number(document.getElementById('gyroPitch').value),
        Number(document.getElementById('gyroYaw').value),
      ];
      const dt = 0.005;
      const filtered = notch(gyro);
      const desiredRoll = rcToRate(rc[0]);
      const desiredPitch = -rcToRate(rc[1]);
      const desiredYaw = rcToRate(rc[3]);
      const rollOut = rollPid.update(desiredRoll, filtered[0], dt);
      const pitchOut = pitchPid.update(desiredPitch, filtered[1], dt);
      const yawOut = yawPid.update(desiredYaw, filtered[2], dt);
      const throttle = rc[2] < 172 ? 0 : Math.round((rc[2] - 172) * 1000 / 1639);
      document.getElementById('out').innerHTML = `
        <strong>rollOut:</strong> ${rollOut.toFixed(2)}<br>
        <strong>pitchOut:</strong> ${pitchOut.toFixed(2)}<br>
        <strong>yawOut:</strong> ${yawOut.toFixed(2)}<br>
        <strong>throttle:</strong> ${throttle}<br>
        <strong>filtered:</strong> ${filtered.map(v => v.toFixed(2)).join(', ')}
      `;
      history.push({rollOut, pitchOut, yawOut});
      draw();
    }

    const history = [];
    let autoTimer = null;

    function startAuto() {
      if (autoTimer) return;
      autoTimer = setInterval(step, 100);
    }
    function stopAuto() { clearInterval(autoTimer); autoTimer = null; }

    function draw() {
      const cvs = document.getElementById('chart');
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0,0,cvs.width,cvs.height);
      ctx.strokeStyle = '#444'; ctx.beginPath();
      for (let x=0; x<=cvs.width; x+=50) { ctx.moveTo(x,0); ctx.lineTo(x,cvs.height); }
      for (let y=0; y<=cvs.height; y+=50) { ctx.moveTo(0,y); ctx.lineTo(cvs.width,y); }
      ctx.stroke();
      ctx.strokeStyle = '#fff';
      const plot = (color, key) => {
        ctx.beginPath();
        for (let i = 0; i < history.length; i++) {
          const x = (i / Math.max(1, history.length - 1)) * cvs.width;
          const y = cvs.height/2 - (history[i][key] / 500) * 120;
          if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.strokeStyle = color; ctx.stroke();
      };
      plot('#4ade80','rollOut');
      plot('#38bdf8','pitchOut');
      plot('#f43f5e','yawOut');
    }

    runStep();
  </script>
</body>
</html>
